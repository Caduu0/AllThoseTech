#List of groups to disable. Has precedence over includedGroups. 'selling.seeds' for example would disable all seeds from the market.
excludedGroups = ["selling.spawn_eggs.minecraft.rabbit_spawn_egg", "selling.spawn_eggs.minecraft.squid_spawn_egg", "selling.spawn_eggs.minecraft.turtle_spawn_egg", "selling.spawn_eggs.minecraft.mooshroom_spawn_egg", "selling.spawn_eggs.minecraft.cow_spawn_egg", "selling.spawn_eggs.minecraft.dolphin_spawn_egg", "selling.spawn_eggs.minecraft.bee_spawn_egg", "selling.spawn_eggs.minecraft.fox_spawn_egg"]
#The range within animals can be fed by the feeding trough.
feedingTroughRange = 8
#The chance for Fertilized Farmland to turn back into regular Farmland (per provided bonus).
# Default: 0.0
# Range: 0.0 ~ 1.0
fertilizerRegressionChance = 0.0
#If true, merchants will be considered babies (on a technical level only), which may resolve exploits based on merchant death loot (like blood)
treatMerchantsLikeBabies = false
#The chance to get a bonus growth when using Red Fertilizer.
# Default: 1.0
# Range: 0.0 ~ 1.0
fertilizerBonusGrowthChance = 1.0
#List of names the merchant can have.
merchantNames = ["Caduu", "Anna"]
#List of groups to enable. 'default' is an alias for the inbuilt defaults (selling.seeds, selling.saplings and selling.fertilizers.minecraft).
includedGroups = ["default", "selling.spawn_eggs", "selling.fertilizers"]
#The range at which the chicken nest picks up laid eggs.
chickenNestRange = 8
#The maximum amount of animals (per type) until the feeding trough stops feeding.
feedingTroughMaxAnimals = 24
#The chance to get a bonus crop when using Green Fertilizer.
# Default: 1.0
# Range: 0.0 ~ 1.0
fertilizerBonusCropChance = 1.0
#The chance to get a bonus growth on farmland hydrated by a Watering Can.
# Default: 1.0
# Range: 0.0 ~ 1.0
hydrationBonusGrowthChance = 1.0
#If true, farmland will not become moist from nearby water. Rain and Watering Cans still hydrate farmland.
disableVanillaWatering = false
