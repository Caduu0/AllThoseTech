#Distributor
[Distributor]
	#The range of the distributor in blocks.
	# Default: 10
	# Range: 1 ~ 64
	"Distributor Range" = 10

	#Routers Config
	[Distributor."RF Upgrades"]
		#The maximum RF per tick that tier 1 can provide.
		# Default: 800
		# Range: > 1
		"RF Per Operation 1" = 800
		#The maximum RF per tick that tier 2 can provide.
		# Default: 32000
		# Range: > 1
		"RF Per Operation 2" = 32000
		#The maximum RF per tick that tier 3 can provide.
		# Default: 64000
		# Range: > 1
		"RF Per Operation 3" = 64000
		#The maximum RF per tick that tier 4 can provide.
		# Default: 128000
		# Range: > 1
		"RF Per Operation 4" = 128000

